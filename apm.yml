name: cc-loadout
version: 1.0.0
description: Claude Code skill suite — frontend design, generative AI, knowledge graphs, compressed comms

# Install: apm install samcrock/cc-loadout
# Or: git clone samcrock/cc-loadout && cd cc-loadout && apm install

dependencies:
  apm:
    # Skill collections — installed as .apm/skills/{category}/{name}/
    # Frontend
    - github.com/samcrock/cc-loadout/.apm/skills/frontend/gsap-core
    - github.com/samcrock/cc-loadout/.apm/skills/frontend/huashu-design
    - github.com/samcrock/cc-loadout/.apm/skills/frontend/impeccable
    - github.com/samcrock/cc-loadout/.apm/skills/frontend/taste-skill
    # General
    - github.com/samcrock/cc-loadout/.apm/skills/general/caveman
    - github.com/samcrock/cc-loadout/.apm/skills/general/grill-me
    # Generative
    - github.com/samcrock/cc-loadout/.apm/skills/generative/higgsfield-generate
    - github.com/samcrock/cc-loadout/.apm/skills/generative/higgsfield-marketplace-cards
    - github.com/samcrock/cc-loadout/.apm/skills/generative/higgsfield-product-photoshoot
    - github.com/samcrock/cc-loadout/.apm/skills/generative/higgsfield-soul-id
    # Knowledge
    - github.com/samcrock/cc-loadout/.apm/skills/knowledge/context7
    - github.com/samcrock/cc-loadout/.apm/skills/knowledge/gitnexus
    - github.com/samcrock/cc-loadout/.apm/skills/knowledge/graphify
    # Internal
    - github.com/samcrock/cc-loadout/.apm/skills/internal/skill-adder